name: Simple Claude Response

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  respond:
    if: contains(github.event.comment.body, '@claude') || contains(github.event.issue.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Respond with Claude
        uses: actions/github-script@v7
        with:
          script: |
            const prompt = context.payload.comment?.body || context.payload.issue?.body;
            const issueNumber = context.payload.issue?.number || context.payload.issue?.number;

            // Call Anthropic API directly
            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': '${{ secrets.ANTHROPIC_API_KEY }}',
                'anthropic-version': '2023-06-01'
              },
              body: JSON.stringify({
                model: 'claude-3-sonnet-20240229',
                max_tokens: 1024,
                messages: [{ role: 'user', content: prompt }]
              })
            });

            const data = await response.json();
            const reply = data.content?.[0]?.text || 'Sorry, I could not process your request.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: reply
            });
