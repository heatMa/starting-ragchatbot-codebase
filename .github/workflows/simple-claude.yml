name: Simple Claude Response

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  respond:
    if: contains(github.event.comment.body, '@claude') || contains(github.event.issue.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Respond with Claude
        uses: actions/github-script@v7
        with:
          script: |
            const https = require('https');

            const prompt = context.payload.comment?.body || context.payload.issue?.body;
            const issueNumber = context.payload.issue?.number || context.payload.issue?.number;

            // Make API call to Anthropic
            const postData = JSON.stringify({
              model: 'claude-3-sonnet-20240229',
              max_tokens: 1024,
              messages: [{ role: 'user', content: prompt }]
            });

            const options = {
              hostname: 'api.anthropic.com',
              path: '/v1/messages',
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': '${{ secrets.ANTHROPIC_API_KEY }}',
                'anthropic-version': '2023-06-01',
                'Content-Length': Buffer.byteLength(postData)
              }
            };

            let reply = '';

            await new Promise((resolve, reject) => {
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', (chunk) => { data += chunk; });
                res.on('end', () => {
                  try {
                    const response = JSON.parse(data);
                    reply = response.content?.[0]?.text || 'Sorry, I could not process your request.';
                    resolve();
                  } catch (e) {
                    reply = 'Error parsing response: ' + data;
                    resolve();
                  }
                });
              });

              req.on('error', (e) => {
                reply = 'Error: ' + e.message;
                resolve();
              });

              req.write(postData);
              req.end();
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: reply
            });
