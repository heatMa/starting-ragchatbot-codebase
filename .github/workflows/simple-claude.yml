name: Simple Claude Response

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  respond:
    if: contains(github.event.comment.body, '@claude') || contains(github.event.issue.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Call Claude API
        id: claude
        run: |
          PROMPT='${{ github.event.comment.body || github.event.issue.body }}'

          RESPONSE=$(curl -s -X POST https://api.anthropic.com/v1/messages \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -d "{
              \"model\": \"claude-3-5-sonnet-20241022\",
              \"max_tokens\": 1024,
              \"messages\": [{\"role\": \"user\", \"content\": \"$PROMPT\"}]
            }")

          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
          echo "API Response: $RESPONSE"

      - name: Post response as comment
        uses: actions/github-script@v7
        with:
          script: |
            const response = JSON.parse('${{ steps.claude.outputs.response }}');
            const reply = response.content?.[0]?.text || 'Sorry, I could not process your request. Error: ' + JSON.stringify(response);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue?.number || context.payload.issue?.number,
              body: reply
            });
